<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" width="600" height="400">
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1528"/>
      <stop offset="100%" stop-color="#060c18"/>
    </radialGradient>
    <radialGradient id="glowGold" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c8a84a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c8a84a" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="600" height="400" fill="url(#bgGrad)"/>

  <g opacity="0.04" stroke="#c8a84a" stroke-width="0.5">
    <line x1="0" y1="66" x2="600" y2="66"/>
    <line x1="0" y1="133" x2="600" y2="133"/>
    <line x1="0" y1="200" x2="600" y2="200"/>
    <line x1="0" y1="266" x2="600" y2="266"/>
    <line x1="0" y1="333" x2="600" y2="333"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
