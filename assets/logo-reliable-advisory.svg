    fill="#c8a84a" letter-spacing="3"
    filter="url(#softGlow)">RA</text>

  <text x="155" y="235" text-anchor="middle"
    font-family="Georgia, serif" font-size="9"
    fill="#b4964a" opacity="0.7">&#x2726;</text>

  <text x="250" y="178" font-family="Georgia, 'Times New Roman', serif"
    font-size="44" font-weight="normal" letter-spacing="10"
