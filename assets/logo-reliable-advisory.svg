    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
  </g>

  <ellipse cx="155" cy="200" rx="90" ry="90" fill="url(#glowGold)"/>

  <circle cx="155" cy="200" r="78" fill="none" stroke="#b4964a" stroke-width="0.8" opacity="0.4"/>
  <circle cx="155" cy="200" r="68" fill="none" stroke="#b4964a" stroke-width="0.4" opacity="0.2"/>

  <polygon points="155,121 158,124 155,127 152,124" fill="#b4964a" opacity="0.8"/>
  <polygon points="155,273 158,276 155,279 152,276" fill="#b4964a" opacity="0.8"/>
  <polygon points="77,200 80,203 77,206 74,203" fill="#b4964a" opacity="0.5"/>
  <polygon points="233,200 236,203 233,206 230,203" fill="#b4964a" opacity="0.5"/>

  <path d="M155 138 L196 155 L196 192 C196 222 178 242 155 252 C132 242 114 222 114 192 L114 155 Z"
